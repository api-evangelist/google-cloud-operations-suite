apis:
  - name: Google Cloud Operations Suite API
    description: >-
      The Operations Suite API provides a unified interface for managing
      observability across Google Cloud services, including monitoring metrics
      and dashboards, centralized logging, distributed tracing, continuous
      profiling, and automated error reporting. It integrates the capabilities
      of Cloud Monitoring, Cloud Logging, Cloud Trace, Cloud Profiler, and
      Error Reporting into a cohesive operations platform.

name: Google Cloud Operations Suite
description: >-
  Google Cloud Operations Suite (formerly Stackdriver) provides integrated
  monitoring, logging, and diagnostics for applications and infrastructure
  running on Google Cloud. It encompasses Cloud Monitoring, Cloud Logging,
  Cloud Trace, Cloud Profiler, and Error Reporting to deliver comprehensive
  observability, real-time visibility, alerting, log analysis, distributed
  tracing, and performance profiling across cloud environments.
